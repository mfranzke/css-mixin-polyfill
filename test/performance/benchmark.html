<!doctype html>
<html>

<head>
	<title>CSS Mixin and Macro Polyfill Performance Test</title>
	<style>
		/* Test styles with CSS @mixin/@macro/@apply rules */
		@macro --test-reset {
			margin: 0;
			padding: 0;
		}

		@mixin --test-colors(--bg <color>: lightblue,
			--text <color>: black) {
			@result {
				background: var(--bg);
				color: var(--text);
			}
		}

		@macro --test-box {
			padding: 10px;
			border: 1px solid #ccc;
			border-radius: 4px;
		}

		.test-element-1 {
			@apply --test-reset;
			@apply --test-colors(blue, white);
		}

		.test-element-2 {
			@apply --test-box;
			@apply --test-colors(green, white);
		}

		.test-element-3 {
			@apply --test-reset;
			@apply --test-box;
		}

		.test-element-4 {
			@apply --test-colors(coral, black);
		}

		.test-element-5 {
			@apply --test-colors;
		}

		/* Multiple applies */
		.test-complex {
			@apply --test-reset;
			@apply --test-box;
			@apply --test-colors(tomato, white);
		}
	</style>
</head>

<body>
	<div class="test-element-1">Test 1</div>
	<div class="test-element-2">Test 2</div>
	<div class="test-element-3">Test 3</div>
	<div class="test-element-4">Test 4</div>
	<div class="test-element-5">Test 5</div>
	<div class="test-complex">Complex Test</div>

	<script src="../../packages/css-mixin-polyfill/dist/index.umd.js"></script>
	<script>
		console.log("Script starting...");

		try {
			console.log("Starting performance measurement...");

			// Check if the polyfill is available
			if (typeof cssMixinMacroPolyfill === "undefined") {
				throw new Error("cssMixinMacroPolyfill is not available");
			}

			console.log(
				"cssMixinMacroPolyfill available:",
				Object.keys(cssMixinMacroPolyfill)
			);

			// Performance measurement
			const startTime = performance.now();

			cssMixinMacroPolyfill.init({ debug: true });

			const endTime = performance.now();
			const initTime = endTime - startTime;

			// Test processing time
			const testCSS = `
@macro --perf-reset {
  margin: 0;
  padding: 0;
}
@mixin --perf-colors(--bg <color>: lightblue) {
  @result {
    background: var(--bg);
    color: white;
  }
}
.performance-test {
  @apply --perf-reset;
  @apply --perf-colors(blue);
}
			`;

			const processStart = performance.now();
			for (let i = 0; i < 1000; i++) {
				cssMixinMacroPolyfill.processCSSText(testCSS);
			}
			const processEnd = performance.now();
			const processTime = processEnd - processStart;

			// Report results
			const results = {
				initTime: initTime,
				processTime: processTime,
				avgProcessTime: processTime / 1000
			};

			console.log("Performance Results:", results);

			// Make results available to test runner
			window.performanceResults = results;
		} catch (error) {
			console.error("Benchmark failed:", error);
			// Still set results so the test doesn't timeout
			window.performanceResults = {
				initTime: 0,
				processTime: 0,
				avgProcessTime: 0,
				error: error.message
			};
		}
	</script>
</body>

</html>
